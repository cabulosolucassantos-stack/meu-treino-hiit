<ion-content [class.bg-acao]="fase === 'AÇÃO'" 
             [class.bg-recuperacao]="fase === 'RECUPERAÇÃO'"
             [class.bg-preparacao]="fase === 'PREPARAÇÃO'"
             [class.bg-descanso-bloco]="fase === 'DESCANSO_BLOCO'"
             [class.piscando]="telaPiscando"
             scroll-y="false"> <div *ngIf="!treinoIniciado" class="tela-inicial">
    <div class="boas-vindas">
      <h1>HIIT Transformer</h1>
      <p>Pronto para o treino, Lucas?</p>
      <button class="btn-iniciar-gigante" (click)="iniciarTreinoPelaPrimeiraVez()">
        <ion-icon name="play" style="color: #000 !important;"></ion-icon>
        INICIAR
      </button>
    </div>
  </div>

  <div class="interface-container" *ngIf="treinoIniciado">
    
    <div class="header-status-row">
      <div class="status-item">
        <small>BLOCO</small>
        <span>{{ (indiceBlocoAtual + 1) }} / {{ totalBlocos }}</span>
      </div>

      <div class="status-item main">
        <small>EXERCÍCIO</small>
        <span class="nome-exercicio">{{ rotuloAtual }}</span>
      </div>

      <div class="status-item">
        <small>ROUND</small>
        <span>{{ (indiceRoundAtual + 1) }} / {{ totalRoundsNoBloco }}</span>
      </div>
    </div>

    <div class="barra-progresso-container">
      <div class="barra-preenchimento" [style.width.%]="progressoTotal * 100"></div>
    </div>

    <div class="timer-main-frame">
      <h1 class="clock-text">
        {{ tempo < 60 ? tempo : formatarTempo(tempo) }}
      </h1>
    </div>

    <div class="footer-controls">
  <div class="main-buttons-row">
    
    <button class="btn-modern green" (click)="iniciarTreino()" *ngIf="!treinando">
      <svg viewBox="0 0 512 512" width="35" height="35" fill="currentColor">
        <path d="M133 440a35.37 35.37 0 01-17.5-4.67c-12-6.8-19.46-20-19.46-34.33V111c0-14.37 7.46-27.53 19.46-34.33a35.13 35.13 0 0135.77.45l247.85 148.36a36 36 0 010 61l-247.89 148.4a35.5 35.5 0 01-18.23 4.72z"></path>
      </svg>
    </button>
    
    <button class="btn-modern orange" (click)="pausarTreino()" *ngIf="treinando">
      <svg viewBox="0 0 512 512" width="35" height="35" fill="currentColor">
        <path d="M176 96h-16a32 32 0 00-32 32v256a32 32 0 0032 32h16a32 32 0 0032-32V128a32 32 0 00-32-32zm176 0h-16a32 32 0 00-32 32v256a32 32 0 0032 32h16a32 32 0 0032-32V128a32 32 0 00-32-32z"></path>
      </svg>
    </button>

    <button class="btn-modern light" (click)="resetarTreino()" *ngIf="!treinando && tempo !== tempoInicial">
      <svg viewBox="0 0 512 512" width="35" height="35" fill="none" stroke="currentColor" stroke-width="40" stroke-linecap="round" stroke-miterlimit="10">
        <path d="M320 146s24.36-12-64-12a160 160 0 10160 160"></path>
        <path d="M319.91 80v80h80" stroke-linejoin="round"></path>
      </svg>
    </button>
  </div>

  <button class="btn-config" (click)="abrirConfiguracoes()" *ngIf="!treinando">
    <svg viewBox="0 0 512 512" width="40" height="40" fill="none" stroke="currentColor" stroke-width="32" stroke-miterlimit="10">
      <path d="M262.29 192.31a64 64 0 1057.4 57.4 64.13 64.13 0 00-57.4-57.4z"></path>
      <path d="M416.39 256a154.34 154.34 0 01-1.53 20.79l45.21 35.46a10.81 10.81 0 012.45 13.75l-42.77 74a10.81 10.81 0 01-13.14 4.59l-53.33-21.49a154.12 154.12 0 01-35.94 20.84l-8.06 56.68a10.83 10.83 0 01-10.7 9.12h-85.54a10.83 10.83 0 01-10.7-9.12l-8.06-56.68a154.12 154.12 0 01-35.94-20.84l-53.33 21.49a10.81 10.81 0 01-13.14-4.59l-42.77-74a10.81 10.81 0 012.45-13.75l45.21-35.46a154.34 154.34 0 01-1.53-20.79 154.34 154.34 0 011.53-20.79l-45.21-35.46a10.81 10.81 0 01-2.45-13.75l42.77-74a10.81 10.81 0 0113.14-4.59l53.33 21.49a154.12 154.12 0 0135.94-20.84l8.06-56.68a10.83 10.83 0 0110.7-9.12h85.54a10.83 10.83 0 0110.7 9.12l8.06 56.68a154.12 154.12 0 0135.94 20.84l53.33-21.49a10.81 10.81 0 0113.14 4.59l42.77 74a10.81 10.81 0 01-2.45 13.75l-45.21 35.46a154.34 154.34 0 011.53 20.79z"></path>
    </svg>
  </button>
</div>
</ion-content>
