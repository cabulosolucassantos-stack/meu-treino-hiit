<ion-content [class.bg-acao]="fase === 'AÇÃO'" 
             [class.bg-recuperacao]="fase === 'RECUPERAÇÃO'"
             [class.bg-preparacao]="fase === 'PREPARAÇÃO'"
             [class.bg-descanso-bloco]="fase === 'DESCANSO_BLOCO'"
             [class.piscando]="telaPiscando"
             scroll-y="false"> <div *ngIf="!treinoIniciado" class="tela-inicial">
    <div class="boas-vindas">
      <h1>HIIT Transformer</h1>
      <p>Pronto para o treino, Lucas?</p>
      <button class="btn-iniciar-gigante" (click)="iniciarTreinoPelaPrimeiraVez()">
        <ion-icon name="play" style="color: #000 !important;"></ion-icon>
        INICIAR
      </button>
    </div>
  </div>

  <div class="interface-container" *ngIf="treinoIniciado">
    
    <div class="header-status-row">
      <div class="status-item">
        <small>BLOCO</small>
        <span>{{ (indiceBlocoAtual + 1) }} / {{ totalBlocos }}</span>
      </div>

      <div class="status-item main">
        <small>EXERCÍCIO</small>
        <span class="nome-exercicio">{{ rotuloAtual }}</span>
      </div>

      <div class="status-item">
        <small>ROUND</small>
        <span>{{ (indiceRoundAtual + 1) }} / {{ totalRoundsNoBloco }}</span>
      </div>
    </div>

    <div class="barra-progresso-container">
      <div class="barra-preenchimento" [style.width.%]="progressoTotal * 100"></div>
    </div>

    <div class="timer-main-frame">
      <h1 class="clock-text">
        {{ tempo < 60 ? tempo : formatarTempo(tempo) }}
      </h1>
    </div>

    <div class="footer-controls">
      <div class="main-buttons-row">
        
        <ion-button class="btn-modern green" (click)="iniciarTreino()" *ngIf="!treinando">
          <span style="color: black; font-weight: bold; z-index: 9999;">PLAY</span>
          <ion-icon name="play" slot="icon-only" style="color: black !important;"></ion-icon>
        </ion-button>
        
        <ion-button class="btn-modern orange" (click)="pausarTreino()" *ngIf="treinando">
          <ion-icon name="pause" slot="icon-only" style="color: #000 !important;"></ion-icon>
        </ion-button>

        <ion-button class="btn-modern light" (click)="resetarTreino()" *ngIf="!treinando && tempo !== tempoInicial">
          <ion-icon name="refresh" slot="icon-only" style="color: #000 !important;"></ion-icon>
        </ion-button>
      </div>

      <ion-button fill="clear" class="btn-config" (click)="abrirConfiguracoes()" *ngIf="!treinando">
        <ion-icon name="settings-outline" slot="icon-only" style="color: #000 !important;"></ion-icon>
      </ion-button>
    </div>

  </div>
</ion-content>
