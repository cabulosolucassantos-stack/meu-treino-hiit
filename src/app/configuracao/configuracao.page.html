<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="home"></ion-back-button>
    </ion-buttons>
    <ion-title>Configurar Treino</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="limparTreinoCompleto()">
        <svg viewBox="0 0 512 512" width="24" height="24" fill="white"><path d="M112 112l20 320c.95 18.49 14.4 32 32 32h192c17.6 0 31.05-13.51 32-32l20-320" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"/><path stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10" stroke-width="32" d="M80 112h352"/><path d="M192 112V72h128v40" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"/><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M256 176v224M184 176l8 224M328 176l-8 224"/></svg>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="global-section">
    <div class="input-item-nacional">
      <label>TEMPO DE PREPARAÇÃO (SEG)</label>
      <input type="number" [(ngModel)]="configService.tempoPreparacao" (ngModelChange)="salvarNoDispositivo()" placeholder="0">
    </div>
    
    <div class="input-item-nacional">
      <label>BEEPS FINAIS (SEG)</label>
      <input type="number" [(ngModel)]="configService.tempoBeep" (ngModelChange)="salvarNoDispositivo()" placeholder="0">
    </div>
  </div>

  <div class="lista-blocos">
    <div class="bloco-card" *ngFor="let bloco of configService.blocos; let i = index">
      
      <div class="bloco-header">
        <div class="header-left">
          <div class="toggle-icon" (click)="bloco.expandido = !bloco.expandido">
            <svg *ngIf="!bloco.expandido" viewBox="0 0 512 512" width="20" height="20" fill="white"><path d="M184 112l144 144-144 144" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48"/></svg>
            <svg *ngIf="bloco.expandido" viewBox="0 0 512 512" width="20" height="20" fill="white"><path d="M112 184l144 144 144-144" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48"/></svg>
          </div>
          <input [(ngModel)]="bloco.nome" (blur)="salvarNoDispositivo()" class="input-nome-bloco">
        </div>

        <div class="bloco-btns">
          <button class="btn-icon-header" (click)="duplicarBloco(i)">
            <svg viewBox="0 0 512 512" width="20" height="20" fill="white"><path d="M408 432H184a40 40 0 01-40-40V120a40 40 0 01184 80h224a40 40 0 0140 40v272a40 40 0 01-40 40z" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="32"/><path d="M312 32H144a80 80 0 00-80 80v272" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"/></svg>
          </button>
          <button class="btn-icon-header trash" (click)="removerBloco(i)">
            <svg viewBox="0 0 512 512" width="20" height="20" fill="#ff4d4d"><path d="M112 112l20 320c.95 18.49 14.4 32 32 32h192c17.6 0 31.05-13.51 32-32l20-320" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"/><path stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10" stroke-width="32" d="M80 112h352"/><path d="M192 112V72h128v40" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"/></svg>
          </button>
        </div>
      </div>

      <div *ngIf="bloco.expandido" class="bloco-content">
        <table class="rounds-table">
          <thead>
            <tr>
              <th class="col-ex">EXERCÍCIO</th>
              <th class="col-num">ESF.</th>
              <th class="col-num">PAU.</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let round of bloco.rounds; let j = index">
              <td><input [(ngModel)]="round.exercicio" placeholder="Exercício" (blur)="salvarNoDispositivo()" class="td-input-text"></td>
              <td><input type="number" [(ngModel)]="round.esforco" (blur)="salvarNoDispositivo()" class="td-input-num"></td>
              <td><input type="number" [(ngModel)]="round.pausa" (blur)="salvarNoDispositivo()" class="td-input-num"></td>
              <td class="col-del">
                <button class="btn-delete-round" (click)="removerRound(i, j)">
                  <svg viewBox="0 0 512 512" width="18" height="18" fill="#ff4d4d"><path d="M256 48C141.31 48 48 141.31 48 256s93.31 208 208 208 208-93.31 208-208S370.69 48 256 48zm75.31 260.69a16 16 0 11-22.62 22.62L256 278.63l-52.69 52.68a16 16 0 01-22.62-22.62L233.37 256l-52.68-52.69a16 16 0 0122.62-22.62L256 233.37l52.69-52.68a16 16 0 0122.62 22.62L278.63 256z"/></svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <div class="add-round-buttons">
          <button class="btn-nacional-add" (click)="addRound(i, 10)">+ ADICIONAR ROUND</button>
        </div>

        <div class="descanso-container">
          <label>DESCANSO PÓS-BLOCO (SEG)</label>
          <input type="number" [(ngModel)]="bloco.descansoPosBloco" (ngModelChange)="salvarNoDispositivo()" placeholder="0">
        </div>
      </div>
    </div>
  </div>

  <div class="acoes-finais">
    <button class="btn-nacional-bloco" (click)="novoBloco()">+ NOVO BLOCO</button>
    <button *ngIf="configService.blocos.length > 0" class="btn-nacional-limpar" (click)="limparTreinoCompleto()">APAGAR TODO O TREINO</button>
  </div>

</ion-content>

<ion-footer>
  <ion-toolbar>
    <div class="footer-row">
      <button class="btn-footer save" (click)="salvar()">SALVAR PRESET</button>
      <button class="btn-footer start" (click)="iniciarTreino()">INICIAR TREINO</button>
    </div>
  </ion-toolbar>
</ion-footer>
